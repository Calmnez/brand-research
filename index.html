
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>브랜드 인텔리전스 터미널</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{min-height:100%;background:#F5F4EF;color:#1a1a17;font-family:"Pretendard",-apple-system,sans-serif;}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d4d1c7;border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    #topbar{position:sticky;top:0;z-index:100;background:#F5F4EF;border-bottom:1px solid #e2e0d8;padding:13px 28px;display:flex;justify-content:space-between;align-items:center;}
    .logo{display:flex;align-items:center;gap:9px;font-size:11px;color:#888;letter-spacing:.08em;font-weight:500;}
    .dot{width:5px;height:5px;border-radius:50%;background:#b8860b;}
    .badge{background:#f5f0e0;border:1px solid #e8d89a;border-radius:3px;padding:2px 8px;font-size:10px;color:#7a6a00;}
    #key-btn{background:none;border:none;cursor:pointer;font-size:10px;color:#bbb;padding:4px 8px;border-radius:3px;transition:color .15s;font-family:inherit;}
    #key-btn:hover{color:#dc2626;}
    #main{max-width:980px;margin:0 auto;padding:44px 24px 90px;}
    #keyscreen{min-height:80vh;display:flex;align-items:center;justify-content:center;}
    #keycard{background:#fff;border:1px solid #e2e0d8;border-radius:10px;padding:40px;max-width:540px;width:100%;animation:fadeUp .4s ease;}
    #keycard h2{font-size:22px;font-weight:700;margin-bottom:6px;}
    #keycard h2 span{color:#b8860b;}
    #keycard>p{font-size:13px;color:#666;line-height:1.7;margin-bottom:24px;}
    .free-badge{display:inline-block;background:#f0f9f0;border:1px solid #86efac;border-radius:3px;padding:2px 8px;font-size:10px;color:#16a34a;margin-left:6px;vertical-align:middle;}
    .step{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid #f0ede5;}
    .step:last-of-type{border-bottom:none;}
    .step-n{font-size:10px;color:#b8860b;width:18px;flex-shrink:0;margin-top:2px;font-weight:700;}
    .step-t{font-size:12px;color:#888;line-height:1.65;}
    .step-t a{color:#4a90d9;text-decoration:none;}
    .step-t a:hover{text-decoration:underline;}
    .key-wrap{position:relative;margin-top:22px;}
    #api-key-input{width:100%;background:#f5f4ef;border:1px solid #d4d1c7;color:#1a1a17;font-family:inherit;font-size:13px;padding:12px 48px 12px 16px;border-radius:6px;outline:none;transition:border-color .2s;}
    #api-key-input:focus{border-color:#b8860b;}
    #api-key-input::placeholder{color:#ccc;}
    #toggle-vis{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;cursor:pointer;font-size:11px;font-family:inherit;}
    #start-btn{width:100%;background:#b8860b;border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:700;padding:13px;cursor:pointer;border-radius:6px;transition:background .2s;margin-top:12px;}
    #start-btn:hover{background:#9a6f09;}
    .key-note{margin-top:10px;padding:10px 14px;background:#f5f4ef;border:1px solid #e2e0d8;border-radius:4px;font-size:11px;color:#aaa;line-height:1.7;}
    #hero{text-align:center;margin-bottom:40px;}
    #hero h1{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:-.03em;margin-bottom:8px;line-height:1.1;}
    #hero h1 span{color:#b8860b;}
    #hero p{font-size:12px;color:#bbb;letter-spacing:.06em;margin-bottom:24px;}
    #search-row{display:flex;max-width:560px;margin:0 auto;}
    #q{flex:1;background:#fff;border:1px solid #d4d1c7;color:#1a1a17;font-family:inherit;font-size:14px;padding:14px 18px;outline:none;border-right:none;border-radius:6px 0 0 6px;transition:border-color .2s;}
    #q:focus{border-color:#b8860b;}
    #q::placeholder{color:#ccc;}
    #go{background:#b8860b;border:none;color:#fff;font-family:inherit;font-size:13px;font-weight:700;padding:14px 22px;cursor:pointer;border-radius:0 6px 6px 0;transition:background .2s;white-space:nowrap;}
    #go:hover{background:#9a6f09;}
    #go:disabled{opacity:.4;cursor:not-allowed;}
    #loading{text-align:center;padding:56px 0;display:none;}
    .status-line{font-size:12px;color:#aaa;animation:pulse 1.2s infinite;margin-bottom:28px;}
    .cursor{color:#b8860b;animation:blink 1s infinite;margin-left:4px;}
    .bars{display:flex;justify-content:center;align-items:flex-end;gap:2px;height:24px;}
    .bar{width:2px;border-radius:1px;}
    #error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:6px;padding:12px 18px;font-size:12px;color:#dc2626;display:none;line-height:1.6;word-break:break-word;}
    #results{display:none;animation:fadeUp .4s ease;}
    .brand-header{background:#fff;border:1px solid #e2e0d8;border-radius:8px;padding:28px 32px;margin-bottom:12px;position:relative;overflow:hidden;}
    .brand-header::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(184,134,11,.05) 0%,transparent 55%);pointer-events:none;}
    .brand-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
    .tag{background:#f0ede5;border:1px solid #d4d1c7;border-radius:4px;padding:3px 10px;font-size:11px;color:#777;}
    .brand-name{font-size:clamp(28px,4vw,44px);font-weight:800;letter-spacing:-.03em;margin-bottom:6px;color:#1a1a17;}
    .brand-tagline{color:#999;font-size:14px;margin-bottom:16px;}
    .brand-overview{color:#555;font-size:14px;line-height:1.85;max-width:680px;}
    #tab-bar{display:flex;gap:2px;overflow-x:auto;padding:4px 6px;background:#eceae2;border:1px solid #d4d1c7;border-radius:6px;margin-bottom:12px;}
    .tab{background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;padding:7px 14px;border-radius:4px;transition:all .15s;white-space:nowrap;color:#999;}
    .tab:hover{color:#555;}
    .tab.active{background:#fff;color:#b8860b;font-weight:700;}
    .panel{display:none;}
    .panel.active{display:block;}
    .card{background:#fff;border:1px solid #e2e0d8;border-radius:8px;padding:24px;margin-bottom:12px;animation:fadeUp .4s ease;}
    .card.al{border-left:3px solid #b8860b;background:#fffef9;}
    .card.ar{border-left:3px solid #f87171;}
    .card.ao{border-left:3px solid #fb923c;}
    .sec-label{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:700;color:#bbb;letter-spacing:.15em;text-transform:uppercase;margin-bottom:18px;}
    .sec-label::before{content:"";height:1px;width:14px;background:#d4d1c7;flex-shrink:0;}
    .sec-label::after{content:"";height:1px;flex:1;background:#e8e6e0;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    @media(max-width:620px){.grid2{grid-template-columns:1fr;}}
    .metric-row{margin-bottom:16px;}
    .metric-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
    .metric-label{font-size:12px;color:#555;font-weight:600;}
    .metric-val{font-size:14px;font-weight:800;color:#1a1a17;}
    .metric-sub{font-size:10px;color:#aaa;margin-left:5px;}
    .metric-bar-wrap{display:flex;align-items:center;gap:8px;}
    .metric-track{flex:1;height:7px;background:#f0ede5;border-radius:4px;overflow:hidden;}
    .metric-fill{height:100%;border-radius:4px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
    .metric-bench{font-size:10px;color:#bbb;white-space:nowrap;font-weight:500;}
    .highlights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
    .hl-item{border-left:3px solid #e2e0d8;padding-left:13px;}
    .hl-title{font-size:13px;font-weight:700;color:#1a1a17;margin-bottom:5px;}
    .hl-detail{font-size:12px;color:#666;line-height:1.65;}
    .swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    @media(max-width:500px){.swot-grid{grid-template-columns:1fr;}}
    .swot-col{padding-top:12px;}
    .swot-label{font-size:10px;font-weight:800;letter-spacing:.12em;margin-bottom:10px;}
    .swot-item{display:flex;gap:8px;margin-bottom:8px;font-size:13px;color:#333;line-height:1.6;align-items:flex-start;}
    .swot-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0;}
    .reframe-q-box{background:#fffef5;border:1px solid #e8e0c0;border-radius:8px;padding:24px 28px;margin-top:4px;}
    .reframe-q-label{font-size:10px;font-weight:800;color:#b8860b;letter-spacing:.15em;margin-bottom:10px;}
    .reframe-q-text{font-size:18px;font-weight:800;color:#b8860b;line-height:1.6;}
    .seg-card{border-radius:6px;padding:20px 22px;margin-bottom:10px;border:1px solid #e2e0d8;background:#fff;}
    .seg-card.top{border-color:#e8e0c0;background:#fffef9;}
    .seg-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .seg-name{font-size:15px;font-weight:700;color:#1a1a17;margin-bottom:4px;}
    .seg-priority{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
    .seg-numbers{display:flex;gap:20px;flex-wrap:wrap;}
    .seg-num-val{font-size:20px;font-weight:800;line-height:1;}
    .seg-num-label{font-size:10px;color:#aaa;margin-top:2px;}
    .seg-desc{font-size:12px;color:#555;line-height:1.7;margin:12px 0;}
    .seg-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    .score-row{margin-bottom:10px;}
    .score-meta{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;color:#666;}
    .score-val{font-weight:700;}
    .score-track{height:5px;background:#f0ede5;border-radius:3px;overflow:hidden;}
    .score-fill{height:100%;border-radius:3px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
    .matrix-wrap{position:relative;width:100%;aspect-ratio:16/7;background:#fafaf6;border-radius:6px;overflow:hidden;border:1px solid #e2e0d8;margin-bottom:10px;}
    .matrix-line-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#e2e0d8;}
    .matrix-line-h{position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e0d8;}
    .matrix-ql{position:absolute;font-size:9px;font-weight:700;opacity:.6;}
    .matrix-axis{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);font-size:9px;color:#bbb;font-weight:600;}
    .matrix-dot{position:absolute;transform:translate(-50%,-50%);}
    .matrix-dot-circle{width:12px;height:12px;border-radius:50%;}
    .matrix-dot-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;white-space:nowrap;font-weight:700;}
    .opp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:500px){.opp-grid{grid-template-columns:1fr;}}
    .opp-card{border:1px solid #e2e0d8;border-radius:6px;padding:18px 20px;background:#fff;transition:border-color .2s;}
    .opp-card:hover{border-color:#b8a88a;}
    .opp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .opp-title{font-size:13px;font-weight:700;color:#1a1a17;}
    .opp-desc{font-size:12px;color:#666;line-height:1.65;margin-bottom:12px;}
    .opp-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .tf-legend{display:flex;gap:14px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
    .tf-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#888;font-weight:600;}
    .tf-dot{width:7px;height:7px;border-radius:50%;}
    .comp-card{border:1px solid #e2e0d8;border-radius:8px;overflow:hidden;margin-bottom:14px;}
    .comp-header{padding:16px 22px;background:#f5f4ef;border-bottom:1px solid #e2e0d8;}
    .comp-name{font-size:16px;font-weight:800;color:#1a1a17;}
    .comp-body{padding:20px 22px;}
    .comp-bs-label{font-size:9px;font-weight:800;color:#dc2626;letter-spacing:.14em;margin-bottom:10px;}
    .comp-blindspot{font-size:13px;color:#222;line-height:1.85;margin-bottom:16px;font-weight:500;}
    .comp-analysis-label{font-size:10px;font-weight:800;color:#b8860b;letter-spacing:.1em;margin-bottom:8px;padding-top:14px;border-top:1px solid #f0ede5;}
    .comp-analysis{font-size:13px;color:#555;line-height:1.85;}
    .comp-opportunity{display:flex;gap:8px;align-items:flex-start;margin-top:14px;padding:12px 16px;background:#fffef9;border:1px solid #e8e0c0;border-radius:5px;}
    .comp-opp-label{font-size:10px;font-weight:800;color:#b8860b;flex-shrink:0;margin-top:1px;}
    .comp-opp-text{font-size:12px;color:#666;line-height:1.65;}
    .strat-card{border-radius:8px;padding:24px 28px;margin-bottom:14px;background:#fff;border:1px solid #e2e0d8;}
    .strat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .strat-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
    .strat-label{font-size:16px;font-weight:700;color:#1a1a17;}
    .strat-rationale{font-size:13px;color:#555;line-height:1.85;margin-bottom:20px;padding:14px 16px;background:#f9f8f3;border-radius:5px;}
    .strat-steps-label{font-size:10px;font-weight:800;color:#aaa;letter-spacing:.14em;margin-bottom:12px;}
    .strat-step{display:flex;gap:12px;margin-bottom:10px;padding:14px 16px;background:#fafaf6;border-radius:6px;border-left:3px solid #e2e0d8;}
    .strat-step.hl{background:#fffef9;border-left-color:#b8860b;}
    .strat-step-num{font-size:11px;font-weight:800;margin-top:1px;flex-shrink:0;width:22px;}
    .strat-step-title{font-size:13px;font-weight:700;color:#1a1a17;margin-bottom:4px;}
    .strat-step-detail{font-size:12px;color:#555;line-height:1.7;}
    .strat-kpi-box{padding:10px 14px;background:#f5f4ef;border-radius:5px;margin:12px 0;font-size:13px;font-weight:600;color:#1a1a17;}
    .strat-kpi-label{font-size:10px;font-weight:800;color:#aaa;letter-spacing:.1em;margin-bottom:4px;}
    .risk-box{background:#fff5f5;border:1px solid #fecaca;border-radius:5px;padding:10px 14px;display:flex;gap:8px;margin-top:4px;}
    .risk-label{font-size:10px;font-weight:800;color:#dc2626;flex-shrink:0;margin-top:1px;}
    .risk-text{font-size:12px;color:#991b1b;line-height:1.65;}
    .core-msg-box{background:#fffef5;border:1px solid #e8e0c0;border-left:3px solid #b8860b;border-radius:8px;padding:20px 24px;margin-bottom:12px;}
    .core-msg-label{font-size:10px;font-weight:800;color:#b8860b;letter-spacing:.12em;margin-bottom:8px;}
    .core-msg-text{font-size:17px;font-weight:700;color:#1a1a17;line-height:1.6;}
    .ch-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;background:#f5f4ef;border:1px solid #e2e0d8;border-radius:5px;margin-bottom:7px;}
    .ch-name{font-size:13px;font-weight:600;color:#1a1a17;margin-bottom:3px;}
    .ch-role{font-size:11px;color:#777;line-height:1.5;}
    .kpi-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f5f4ef;border:1px solid #e2e0d8;border-radius:5px;margin-bottom:7px;}
    .kpi-cat{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;margin-bottom:4px;}
    .kpi-metric{font-size:13px;font-weight:600;color:#1a1a17;}
    .kpi-target{font-size:12px;font-weight:700;text-align:right;max-width:110px;line-height:1.4;}
    .insight-box{background:#fffef5;border:1px solid #e8e0c0;border-left:3px solid #b8860b;border-radius:8px;padding:22px 28px;margin-top:4px;}
    .insight-label{font-size:10px;font-weight:800;color:#b8860b;letter-spacing:.18em;margin-bottom:10px;}
    .insight-text{font-size:16px;font-weight:700;color:#1a1a17;line-height:1.75;}
    #reset-btn{display:block;margin:40px auto 0;background:none;border:1px solid #d4d1c7;color:#aaa;font-family:inherit;font-size:11px;padding:9px 22px;cursor:pointer;border-radius:5px;transition:all .15s;}
    #reset-btn:hover{border-color:#b8a88a;color:#555;}
  </style>
</head>
<body>
<div id="topbar">
  <div class="logo"><div class="dot" id="dot"></div>브랜드 인텔리전스 터미널<span class="badge">Powered by Gemini</span></div>
  <button id="key-btn" onclick="showKeyScreen()">키 변경</button>
</div>
<div id="main">
  <div id="keyscreen">
    <div id="keycard">
      <h2>Google Gemini <span>API 키</span> 설정 <span class="free-badge">무료</span></h2>
      <p>Google AI Studio에서 무료로 발급받은 API 키를 입력하세요.</p>
      <div class="step"><div class="step-n">01</div><div class="step-t"><a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> 접속 후 Create API Key 클릭</div></div>
      <div class="step"><div class="step-n">02</div><div class="step-t">생성된 키 복사 (AIza...)</div></div>
      <div class="step"><div class="step-n">03</div><div class="step-t">아래에 붙여넣기 후 시작</div></div>
      <div class="key-wrap">
        <input id="api-key-input" type="password" placeholder="AIza..."/>
        <button id="toggle-vis" onclick="toggleVis()">표시</button>
      </div>
      <button id="start-btn" onclick="saveKey()">분석 시작하기 →</button>
      <div class="key-note">키는 이 브라우저 세션에만 저장됩니다. 서버로 전송되지 않습니다.</div>
    </div>
  </div>
  <div id="app" style="display:none;">
    <div id="hero">
      <h1>브랜드를 <span>컨설팅</span>합니다</h1>
      <p>문제 재정의 · 세그먼트 평가 · 경쟁사 맹점 · 전략 방향 · 마케팅 지표</p>
      <div id="search-row">
        <input id="q" type="text" placeholder="기업명 또는 브랜드명을 입력하세요" onkeydown="if(event.key==='Enter')analyze()"/>
        <button id="go" onclick="analyze()">분석하기 →</button>
      </div>
    </div>
    <div id="loading"><div class="status-line"><span id="status-txt">분석 중...</span><span class="cursor">_</span></div><div class="bars" id="bars"></div></div>
    <div id="error-box"></div>
    <div id="results"></div>
  </div>
</div>
<script>
const SYSTEM_PROMPT = `당신은 맥킨지 수준 브랜드 전략 컨설턴트입니다. 반드시 순수 JSON만 반환하세요. 마크다운 백틱 금지. name/hq/founded 제외 모든 텍스트는 한국어.

{
  "name":"브랜드명","tagline":"포지셔닝","sector":"산업","founded":"연도","hq":"위치",
  "keywords":["태그1","태그2","태그3","태그4","태그5"],
  "overview":"2~3문장 개요","market_position":"경쟁 구도 2~3문장",
  "brand_metrics":{
    "market_share":{"value":"XX%","note":"국내 점유율, 기준 명시","benchmark":"vs 경쟁사"},
    "revenue":{"value":"XXXX억","note":"연 매출/GMV, 출처","yoy":"YoY +XX%"},
    "users":{"value":"XXX만명","note":"MAU/회원수, 기준","benchmark":"vs 경쟁사"},
    "growth":{"value":"+XX%","note":"성장률","benchmark":"vs 업계 평균"}
  },
  "recent_highlights":[{"title":"헤드라인","detail":"수치 포함 설명"},{"title":"...","detail":"..."},{"title":"...","detail":"..."}],

function aggressiveJsonClean(raw) {
  // Step 1: strip markdown fences
  let s = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
  // Step 2: find outermost { }
  const st = s.indexOf('{');
  if (st === -1) throw new Error('JSON 블록 없음');
  let depth = 0, inStr = false, esc = false, end = -1;
  for (let i = st; i < s.length; i++) {
    const c = s[i];
    if (esc) { esc = false; continue; }
    if (c === '\\' && inStr) { esc = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') depth++;
    else if (c === '}') { depth--; if (depth === 0) { end = i; break; } }
  }
  let candidate = end !== -1 ? s.slice(st, end + 1) : s.slice(st);
  // Step 3: direct parse
  try { return JSON.parse(candidate); } catch (_) {}
  // Step 4: fix common issues — remove literal newlines/tabs inside strings, fix unescaped quotes
  let cleaned = '';
  inStr = false; esc = false;
  for (let i = 0; i < candidate.length; i++) {
    const c = candidate[i];
    if (esc) { cleaned += c; esc = false; continue; }
    if (c === '\\') { cleaned += c; if (inStr) esc = true; continue; }
    if (c === '"') { inStr = !inStr; cleaned += c; continue; }
    if (inStr) {
      if (c === '\n' || c === '\r') { cleaned += ' '; continue; }
      if (c === '\t') { cleaned += ' '; continue; }
      // Check for unescaped quote: look ahead to see if context suggests it's mid-string
      cleaned += c;
    } else {
      cleaned += c;
    }
  }
  try { return JSON.parse(cleaned); } catch (_) {}
  // Step 5: aggressive — replace all " inside string values with escaped version
  // Use a state machine to identify string boundaries precisely
  let result = '';
  let state = 'OUT'; // OUT, KEY, COLON, VAL
  let buf = '';
  let i = 0;
  while (i < cleaned.length) {
    const c = cleaned[i];
    if (state === 'OUT' || state === 'KEY' || state === 'VAL') {
      if (c === '"') {
        // Start of string — collect until closing quote
        let str = '"';
        i++;
        let innerEsc = false;
        while (i < cleaned.length) {
          const sc = cleaned[i];
          if (innerEsc) { str += sc; innerEsc = false; i++; continue; }
          if (sc === '\\') { str += sc; innerEsc = true; i++; continue; }
          if (sc === '"') {
            // Check if this really closes the string
            let j = i + 1;
            while (j < cleaned.length && (cleaned[j] === ' ' || cleaned[j] === '\t')) j++;
            const nx = cleaned[j];
            if (nx === ':' || nx === ',' || nx === '}' || nx === ']' || nx === '\n' || nx === '\r' || j >= cleaned.length) {
              str += '"'; i++; break;
            } else {
              // Unescaped interior quote — escape it
              str += '\\"'; i++; continue;
            }
          }
          str += sc; i++;
        }
        result += str;
        continue;
      } else {
        result += c;
      }
    }
    i++;
  }
  try { return JSON.parse(result); } catch (_) {}
  // Step 6: truncation recovery
  let t = cleaned.replace(/,\s*$/, '').replace(/:\s*$/, ': ""');
  let br = 0, bk = 0; inStr = false; esc = false;
  for (const c of t) {
    if (esc) { esc = false; continue; }
    if (c === '\\' && inStr) { esc = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') br++; else if (c === '}') br--;
    else if (c === '[') bk++; else if (c === ']') bk--;
  }
  if (inStr) t += '"';
  t += ']'.repeat(Math.max(0, bk));
  t += '}'.repeat(Math.max(0, br));
  try { return JSON.parse(t); } catch (e) { throw new Error('JSON 파싱 실패: ' + e.message); }
}

  [['도전적 기회','#f87171','6%','4%'],['핵심 기회','#16a34a','54%','4%'],['낮은 우선순위','#aaa','6%','54%'],['빠른 실행','#0284c7','54%','54%']].forEach(([lbl,col,l,t])=>{const ql=el('div','matrix-ql');ql.style.cssText='left:'+l+';top:'+t+';color:'+col;ql.textContent=lbl;mw.appendChild(ql);});
  const dc=['#b8860b','#4fb3f6','#4ade80','#a78bfa'];
  opp.forEach((item,idx)=>{const col=dc[idx%dc.length];const lp=(4+(item.feasibility/100)*90)+'%';const tp=(4+((100-item.impact)/100)*85)+'%';const dd=el('div','matrix-dot');dd.style.cssText='left:'+lp+';top:'+tp;const circle=el('div','matrix-dot-circle');circle.style.background=col;dd.appendChild(circle);const lbl=el('div','matrix-dot-label');lbl.style.color=col;lbl.textContent=item.title;dd.appendChild(lbl);mw.appendChild(dd);});
  c.appendChild(mw);
  const tfl=el('div','tf-legend');[['단기','#16a34a'],['중기','#d97706'],['장기','#dc2626']].forEach(([l,col])=>{const ti=el('div','tf-item');const td=el('div','tf-dot');td.style.background=col;ti.appendChild(td);ti.appendChild(document.createTextNode(l));tfl.appendChild(ti);});
  c.appendChild(tfl);p.appendChild(c);
  const og=el('div','opp-grid');
  opp.forEach(item=>{
    const oc=el('div','opp-card');const oh=el('div','opp-header');
    const ot=el('div','opp-title');ot.textContent=item.title;oh.appendChild(ot);
    const tb=el('span','tag');tb.textContent=item.timeframe;tb.style.cssText='background:'+TF_C[item.timeframe]+'18;border-color:'+TF_C[item.timeframe]+'40;color:'+TF_C[item.timeframe];oh.appendChild(tb);oc.appendChild(oh);
    const od=el('div','opp-desc');od.textContent=item.description;oc.appendChild(od);
    const ob=el('div','opp-bars');ob.appendChild(scoreBar('임팩트',item.impact,'#b8860b'));ob.appendChild(scoreBar('실현가능성',item.feasibility,'#4fb3f6'));oc.appendChild(ob);
    og.appendChild(oc);
  });
  p.appendChild(og);
}

function renderTab4(d){
  const p=document.getElementById('panel-4');
  p.appendChild(secLabel('경쟁사 맹점 심층 분석'));
  (d.competitor_blindspots||[]).forEach(comp=>{
    const cc=el('div','comp-card');
    const ch=el('div','comp-header');const cn=el('div','comp-name');cn.textContent=comp.competitor;ch.appendChild(cn);cc.appendChild(ch);
    const cb=el('div','comp-body');
    const cbl=el('div','comp-bs-label');cbl.textContent='BLIND SPOT';cb.appendChild(cbl);
    const ct=el('div','comp-blindspot');ct.textContent=comp.blindspot;cb.appendChild(ct);
    if(comp.deep_analysis){const dal=el('div','comp-analysis-label');dal.textContent='구조적 분석';cb.appendChild(dal);const da=el('div','comp-analysis');da.textContent=comp.deep_analysis;cb.appendChild(da);}
    if(comp.opportunity){const ob=el('div','comp-opportunity');const ol=el('div','comp-opp-label');ol.textContent='기회';ob.appendChild(ol);const ot=el('div','comp-opp-text');ot.textContent=comp.opportunity;ob.appendChild(ot);cb.appendChild(ob);}
    cc.appendChild(cb);p.appendChild(cc);
  });
}

function renderTab5(d){
  const p=document.getElementById('panel-5');const acs=['#b8860b','#4fb3f6','#4ade80'];
  (d.strategic_directions||[]).forEach((s,i)=>{
    const ac=acs[i%acs.length];const sc=el('div','strat-card');sc.style.borderTop='3px solid '+ac;
    const sh=el('div','strat-header');
    const snum=el('div','strat-num');snum.style.cssText='background:'+ac+'18;color:'+ac;snum.textContent=i+1;sh.appendChild(snum);
    const sl=el('span','strat-label');sl.textContent=s.label;sh.appendChild(sl);sc.appendChild(sh);
    const sr=el('div','strat-rationale');sr.textContent=s.rationale;sc.appendChild(sr);
    const sal=el('div','strat-steps-label');sal.textContent='구체적 실행 단계';sc.appendChild(sal);
    const steps=s.steps||[];
    steps.forEach((step,j)=>{
      const sa=el('div','strat-step'+(j===0?' hl':''));
      const san=el('div','strat-step-num');san.style.color=ac;san.textContent='0'+(j+1);sa.appendChild(san);
      const sb=el('div');
      const st=el('div','strat-step-title');st.textContent=typeof step==='string'?step:step.step;sb.appendChild(st);
      if(step.detail){const sd=el('div','strat-step-detail');sd.textContent=step.detail;sb.appendChild(sd);}
      sa.appendChild(sb);sc.appendChild(sa);
    });
    if(s.kpi){const kl=el('div','strat-kpi-label');kl.textContent='성공 기준';sc.appendChild(kl);const kv=el('div','strat-kpi-box');kv.textContent=s.kpi;sc.appendChild(kv);}
    const rb=el('div','risk-box');const rl=el('span','risk-label');rl.textContent='RISK';rb.appendChild(rl);const rt=el('span','risk-text');rt.textContent=s.risk;rb.appendChild(rt);sc.appendChild(rb);p.appendChild(sc);
  });
}

function renderTab6(d){
  const p=document.getElementById('panel-6');const ms=d.marketing_strategy||{};
  const cmb=el('div','core-msg-box');const cml=el('div','core-msg-label');cml.textContent='핵심 메시지';cmb.appendChild(cml);const cmt=el('div','core-msg-text');cmt.textContent=ms.core_message;cmb.appendChild(cmt);p.appendChild(cmb);
  const g=el('div','grid2');
  const cc=card();cc.appendChild(secLabel('채널 전략'));
  (ms.channels||[]).forEach(ch=>{const cr=el('div','ch-row');const cl=el('div');const cn=el('div','ch-name');cn.textContent=ch.channel;cl.appendChild(cn);const crl=el('div','ch-role');crl.textContent=ch.role;cl.appendChild(crl);cr.appendChild(cl);const pt=el('span','tag');pt.textContent=ch.priority;pt.style.cssText='background:'+CH_C[ch.priority]+'18;border-color:'+CH_C[ch.priority]+'40;color:'+CH_C[ch.priority];cr.appendChild(pt);cc.appendChild(cr);});
  g.appendChild(cc);
  const kc=card();kc.appendChild(secLabel('핵심 KPI'));
  (ms.kpis||[]).forEach(kpi=>{const kr=el('div','kpi-row');const kl=el('div');const kb=el('div','kpi-cat');kb.textContent=kpi.category;kb.style.cssText='background:'+CAT_C[kpi.category]+'18;color:'+CAT_C[kpi.category]+';border:1px solid '+CAT_C[kpi.category]+'30';kl.appendChild(kb);const km=el('div','kpi-metric');km.textContent=kpi.metric;kl.appendChild(km);kr.appendChild(kl);const kt=el('div','kpi-target');kt.style.color=CAT_C[kpi.category]||'#888';kt.textContent=kpi.target;kr.appendChild(kt);kc.appendChild(kr);});
  g.appendChild(kc);p.appendChild(g);
}
